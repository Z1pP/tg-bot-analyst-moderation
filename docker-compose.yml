version: '3.8'

# 1. Шаблон общих настроек (сборка, рестарт, сеть, логи)
x-common-setup: &common-setup
  build: .
  restart: unless-stopped
  env_file: .env
  networks:
    - botnet
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"
  volumes:
    - ./logs:/app/logs
    - .:/app

# 2. Шаблон переменных окружения для подключения к БД и Redis внутри сети Docker
x-db-env: &db-env
  # Эти значения переопределяют то, что в .env, так как внутри Docker хосты называются 'db' и 'redis'
  DEV_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
  DEV_DB_URL_FOR_ALEMBIC: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
  PROD_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
  PROD_DB_URL_FOR_ALEMBIC: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
  REDIS_URL: redis://${REDIS_HOST:-redis}:${REDIS_PORT:-6379}/${REDIS_DB:-0}
  RABBITMQ_HOST: rabbitmq
  RABBITMQ_USER: ${RABBITMQ_USER:-guest}
  RABBITMQ_PASS: ${RABBITMQ_PASS:-guest}
  PYTHONPATH: /app/src

services:
  bot:
    <<: *common-setup
    ports:
      - "8000:8000"
      - "8080:8080"
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      tunnel: { condition: service_started }
      tunnel_api: { condition: service_started }
    environment:
      <<: *db-env
      SERVICE_NAME: bot
      USE_WEBHOOK: "True"
    command: >
      bash -c "
        echo '⏳ Waiting for Cloudflare Tunnels...';
        until curl -s http://tunnel:4040/metrics | grep -q 'cloudflared_tunnel_user_hostnames_counts'; do
          sleep 2;
        done;
        until curl -s http://tunnel_api:4041/metrics | grep -q 'cloudflared_tunnel_user_hostnames_counts'; do
          sleep 2;
        done;
        WEBHOOK_URL=\$$(curl -s http://tunnel:4040/metrics | grep -Eo 'https://[a-z0-9-]+\.trycloudflare\.com' | head -1);
        API_PUBLIC_URL=\$$(curl -s http://tunnel_api:4041/metrics | grep -Eo 'https://[a-z0-9-]+\.trycloudflare\.com' | head -1);
        echo '🌐 Webhook URL: ' \$$WEBHOOK_URL;
        echo '🌐 API URL: ' \$$API_PUBLIC_URL;
        export PUBLIC_URL=\$$API_PUBLIC_URL;
        python src/main.py --webhook-url \$$WEBHOOK_URL
      "

  db:
    image: postgres:14
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TIMEZONE:-Europe/Moscow}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_EXTERNAL_PORT:-5434}:5432"
    networks:
      - botnet

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - botnet

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ports:
      - "127.0.0.1:15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - botnet

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --url http://bot:8000 --metrics 0.0.0.0:4040
    networks:
      - botnet

  tunnel_api:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --url http://bot:8080 --metrics 0.0.0.0:4041
    networks:
      - botnet

  scheduler:
    <<: *common-setup
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    environment:
      <<: *db-env
      SERVICE_NAME: scheduler
    command: python src/taskiq_scheduler_entrypoint.py

  analytics_scheduler:
    <<: *common-setup
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    environment:
      <<: *db-env
      SERVICE_NAME: analytics_scheduler
    command: python src/analytics_scheduler_entrypoint.py

  worker:
    <<: *common-setup
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    environment:
      <<: *db-env
      SERVICE_NAME: worker
    command: taskiq worker scheduler.taskiq:broker tasks.report_tasks tasks.analytics_tasks tasks.moderation_tasks

networks:
  botnet:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
